name: Go fmt Check

on:
  push:
  pull_request:

jobs:
  go-fmt:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Run go fmt
      run: |
        go fmt main.go
